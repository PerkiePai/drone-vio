%YAML:1.0
# OpenVINS config for Isaac Sim nadir drone dataset.
# Monocular, IMU (FRD body, 250 Hz) + downward camera (~30 Hz, 960x600).
# Extrinsic is rigid (DOWN_STABILIZE=False) — constant, valid for VIO.

verbosity: "INFO"

use_fej: true
integration: "rk4"
use_stereo: false
max_cameras: 1

calib_cam_extrinsics: false
calib_cam_intrinsics: true
calib_cam_timeoffset: true
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

# Wide-baseline experiment (2026-06-23): tried 25 (≈16 m baseline, ~11% parallax
# at 150 m depth) vs 11 (≈7 m). NO effect — scale still breaks at ~20-24 m and runs
# away; the divergence-onset altitude did not move. Reverted to 11. The limiter is
# observability (near-uniform far scene + tracking low-contrast far features), not
# the clone-window length. See backend/CLAUDE.md -> Isaac Sim -> Option A RESULTS.
max_clones: 11
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 40
dt_slam_delay: 1

gravity_mag: 9.81

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

# ZUPT: disabled — drone rises immediately from frame 1, never fully static
try_zupt: false
zupt_chi2_multipler: 1
zupt_max_velocity: 0.3
zupt_noise_multiplier: 10
zupt_max_disparity: 1.0
zupt_only_at_beginning: true

# AGL DEPTH-PRIOR experiment (bag = isaac_sim_agl.bag, /baro_height = -true AGL).
# We want OV's depth-prior to read the TRUE camera-to-ground depth (AGL) so it can
# anchor monocular scale at altitude over deep terrain. But the SAME /baro_height
# also drives the vertical position update — feeding AGL there would corrupt p_z.
# So: keep use_baro:true (so baro_altitude_m, which the depth prior reads, updates)
# but set baro_noise_std HUGE so the vertical Kalman update is inert. Net effect:
# depth prior gets AGL; vertical position is left to vision+IMU.
use_baro: true
baro_noise_std: 1000000.0   # inert vertical update (we only want the depth-prior path)
baro_chi2_multiplier: 1.0

use_baro_in_init: false     # don't feed AGL into init as if it were altitude
baro_init_sigma: 0.5

fi_use_baro_depth_prior: true   # set feature depth = AGL when triangulation fails (altitude)

# ==================================================================
# Initialization.  CRITICAL: init_max_disparity is the threshold ABOVE which
# DYNAMIC init triggers (below it OV thinks the platform is stationary and tries
# STATIC init, which needs an accel jerk the smooth constant-velocity climb never
# produces -> "failed static init: no accel jerk detected" forever).  Measured
# disparity at altitude is only ~6-8 px, so 80.0 kept it stuck in static mode.
# Set the threshold BELOW the real disparity so dynamic init fires.
# RESULT: this fix makes dynamic init fire and scale locks correctly below ~20 m
# altitude, but the filter still diverges as the drone climbs (parallax vanishes
# over the deep Cesium terrain -> monocular scale unobservable). See
# backend/CLAUDE.md -> Isaac Sim -> Option A RESULTS. Full flight needs true AGL.
init_window_time: 2.0
init_imu_thresh: 1.5
init_max_disparity: 1.5     # px; < real ~6-8 px disparity -> triggers dynamic init
init_max_features: 75

# dynamic init: works during motion (drone rises immediately, no static period)
init_dyn_use: true
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.05
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0
init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12
init_dyn_bias_g: [0.0, 0.0, 0.0]
init_dyn_bias_a: [0.0, 0.0, 0.0]

# ==================================================================
record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"

save_total_state: true
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# Front-end: KLT on 960x600 nadir imagery
use_klt: true
num_pts: 300
fast_threshold: 15          # ground texture varies; lower threshold helps
grid_x: 5
grid_y: 3                   # 960x600: fewer rows
min_px_dist: 10
knn_ratio: 0.70
track_frequency: 30.0
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "CLAHE"   # outdoor lighting in sim

use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: false

relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"
